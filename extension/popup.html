<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Willow Wish Price Watcher</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 260px; padding: 12px; color: #1a1a1a; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    button { width: 100%; padding: 7px 8px; border: none; border-radius: 6px; background: #f97316; color: white; font-weight: 600; font-size: 13px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    .status { font-size: 12px; color: #555; margin-bottom: 8px; }
    .status.warn { color: #b45309; }
    .hint { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>Willow Wish Price Watcher</h1>

  <div class="status" id="sessionStatus">Checking session…</div>
  <button id="refreshBtn">Refresh now</button>
  <div class="hint">
    No separate login needed — this extension uses your existing Willow
    Wish website session. Just make sure you're logged in at
    willowwish.dev in this browser.
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
