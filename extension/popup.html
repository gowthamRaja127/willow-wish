<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Willow Wish Price Watcher</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 260px; padding: 12px; color: #1a1a1a; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    button { width: 100%; padding: 7px 8px; border: none; border-radius: 6px; background: #f97316; color: white; font-weight: 600; font-size: 13px; cursor: pointer; }
    button.secondary { background: #eee; color: #333; margin-top: 6px; }
    button:disabled { opacity: 0.6; cursor: default; }
    .error { color: #b91c1c; font-size: 12px; margin: -2px 0 8px; }
    .status { font-size: 12px; color: #555; margin-bottom: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Willow Wish Price Watcher</h1>

  <div id="loginView">
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <div id="loginError" class="error hidden"></div>
    <button id="loginBtn">Log in</button>
  </div>

  <div id="loggedInView" class="hidden">
    <div class="status" id="whoami"></div>
    <div class="status" id="lastRun"></div>
    <button id="refreshBtn">Refresh now</button>
    <button id="logoutBtn" class="secondary">Log out</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
