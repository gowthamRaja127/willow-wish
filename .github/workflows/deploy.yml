name: Deploy Application and Edge Functions

on:
  push:
    branches:
      - main
      - release/dev

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: willow-wish
          directory: dist/willow-wish-app/browser
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-supabase:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy scrape-product --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy get-shared --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
